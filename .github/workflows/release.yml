name: Release

"on":
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.11.19"

jobs:
  build:
    name: Validate and build distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Verify release source
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Releases must be dispatched from the main branch; got ${GITHUB_REF}."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: uv.lock

      - name: Validate release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          eval "$(python - <<'PY'
          from pathlib import Path
          import re
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())

          version = pyproject["project"]["version"]

          if not re.fullmatch(r"\d+\.\d+\.\d+((a|b|rc)\d+)?", version):
              raise SystemExit(
                  "Release version must look like 1.2.3, 1.2.3a1, 1.2.3b1, "
                  f"or 1.2.3rc1; got {version!r}."
              )

          if ".dev" in version or "+" in version:
              raise SystemExit(f"Development/local versions cannot be released: {version!r}.")

          tag = f"v{version}"
          prerelease = str(bool(re.search(r"(a|b|rc)\d+$", version))).lower()

          print(f"RELEASE_VERSION={version}")
          print(f"RELEASE_TAG={tag}")
          print(f"RELEASE_PRERELEASE={prerelease}")
          PY
          )"

          {
            echo "version=${RELEASE_VERSION}"
            echo "tag=${RELEASE_TAG}"
            echo "prerelease=${RELEASE_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Tag ${RELEASE_TAG} already exists. Bump the version before releasing."
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub release ${RELEASE_TAG} already exists. Bump the version before releasing."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --all-groups --extra community

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build distributions
        run: uv build --no-sources

      - name: Verify distribution metadata
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import zipfile

          version = os.environ["RELEASE_VERSION"]
          dist = Path("dist")
          wheels = sorted(dist.glob("*.whl"))
          sdists = sorted(dist.glob("*.tar.gz"))

          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(
                  f"Expected exactly one wheel and one sdist, found {wheels!r} and {sdists!r}."
              )

          wheel = wheels[0]
          expected_wheel = f"timebase_mcp-{version}-py3-none-any.whl"
          if wheel.name != expected_wheel:
              raise SystemExit(f"Unexpected wheel name {wheel.name!r}; expected {expected_wheel!r}.")

          with zipfile.ZipFile(wheel) as archive:
              metadata_name = next(
                  name for name in archive.namelist() if name.endswith(".dist-info/METADATA")
              )
              metadata = archive.read(metadata_name).decode()

          if f"Version: {version}" not in metadata:
              raise SystemExit(f"Wheel metadata does not contain Version: {version}.")

          forbidden_requirement_fragments = ("nexus.deltixhub.com",)
          requires_dist_lines = [
              line for line in metadata.splitlines() if line.startswith("Requires-Dist:")
          ]
          leaked = [
              fragment
              for fragment in forbidden_requirement_fragments
              if any(fragment in line for line in requires_dist_lines)
          ]
          if leaked:
              raise SystemExit(
                  f"Wheel requirements contain private repository reference(s): {leaked}."
              )
          PY

      - name: Upload distribution artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish distribution to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/timebase-mcp
    permissions:
      contents: read
      id-token: write # IMPORTANT: mandatory for trusted publishing
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-container:
    name: Publish container image to GHCR
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-pypi
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Resolve image name
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          image="ghcr.io/${REPOSITORY,,}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ needs.build.outputs.tag }}
            type=raw,value=${{ needs.build.outputs.version }}
            type=raw,value=latest,enable=${{ needs.build.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=TimeBase MCP
            org.opencontainers.image.description=Model Context Protocol (MCP) server for TimeBase
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-pypi
      - publish-container
    permissions:
      contents: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          PRERELEASE: ${{ needs.build.outputs.prerelease }}
        run: |
          args=(
            "--repo=${GITHUB_REPOSITORY}"
            "--target=${GITHUB_SHA}"
            "--generate-notes"
            "--title=${TAG}"
            "--draft"
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=("--prerelease" "--latest=false")
          fi

          gh release create "${TAG}" "${args[@]}" dist/*
